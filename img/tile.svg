<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="tile-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bd93f9"/>
      <stop offset="100%" style="stop-color:#6272a4"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
    .active-tab { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Disc backdrop, matches glass.svg framing -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#tile-grad)" stroke-width="3"/>

  <!-- The tile bar at the top: tabs left, workspaces right -->
  <!-- Tabs (left): three coloured squares, the third is "active" -->
  <rect x="38" y="46" width="8" height="8" fill="#ff5555" opacity="0.4"/>
  <rect x="50" y="46" width="8" height="8" fill="#50fa7b" opacity="0.4"/>
  <rect class="active-tab" x="62" y="46" width="8" height="8" fill="#bd93f9"/>
  <rect x="74" y="46" width="8" height="8" fill="#ffb86c" opacity="0.4"/>

  <!-- Workspaces (right): 10 fixed slots, [0] then [1 2 3] [4 5 6] [7 8 9] -->
  <!-- Slot 0 (special, leftmost in WS group) -->
  <rect x="160" y="46" width="8" height="8" fill="none" stroke="#555555" stroke-width="1"/>
  <!-- gap -->
  <!-- Slots 1 2 3, slot 1 is current -->
  <rect x="174" y="46" width="8" height="8" fill="#ffffff"/>
  <rect x="186" y="46" width="8" height="8" fill="#555555"/>
  <rect x="198" y="46" width="8" height="8" fill="none" stroke="#555555" stroke-width="1"/>
  <!-- gap -->
  <!-- Slots 4 5 6 (all empty) -->
  <rect x="212" y="46" width="8" height="8" fill="none" stroke="#555555" stroke-width="1"/>

  <!-- Tiled window region -->
  <!-- One large active tile (filled with terminal feel) -->
  <rect x="38" y="60" width="180" height="116" rx="4" fill="#1a1b26" stroke="#bd93f9" stroke-width="2"/>
  <!-- Mini "screen content" inside the tile -->
  <text x="46" y="78" font-family="monospace" font-size="7" fill="#9ece6a" opacity="0.7">geir@juba</text>
  <text x="100" y="78" font-family="monospace" font-size="7" fill="#a9b1d6" opacity="0.5">:~/$</text>
  <text x="124" y="78" font-family="monospace" font-size="7" fill="#c0caf5" opacity="0.6">tile</text>
  <text x="46" y="92" font-family="monospace" font-size="6.5" fill="#565f89" opacity="0.55">pure x86_64 asm tiling</text>
  <text x="46" y="103" font-family="monospace" font-size="6.5" fill="#565f89" opacity="0.55">no libc, no toolkit</text>
  <text x="46" y="114" font-family="monospace" font-size="6.5" fill="#565f89" opacity="0.55">X11 wire over socket</text>

  <!-- Inset row of tiled siblings (suggesting other tabs / split potential) -->
  <rect x="46" y="128" width="50" height="38" rx="2" fill="#24283b" stroke="#7aa2f7" stroke-width="1" opacity="0.55"/>
  <rect x="102" y="128" width="50" height="38" rx="2" fill="#24283b" stroke="#7aa2f7" stroke-width="1" opacity="0.45"/>
  <rect x="158" y="128" width="52" height="38" rx="2" fill="#24283b" stroke="#7aa2f7" stroke-width="1" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="128" y="202" font-family="monospace" font-size="26" font-weight="bold" fill="url(#tile-grad)" text-anchor="middle" letter-spacing="6">tile</text>
  <text x="128" y="220" font-family="monospace" font-size="7.5" fill="#565f89" text-anchor="middle">pure assembly tiling WM</text>
</svg>
